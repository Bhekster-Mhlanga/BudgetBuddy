name: BudgetBuddy CI

# Runs on every push and every pull request to main or develop
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:

  # ============================================================
  # JOB 1 — Build the APK and run unit + instrumented tests
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required for modern Android Gradle Plugin)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Cache Gradle dependencies so builds are faster after the first run
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable (Linux requirement)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Run pure JVM unit tests (ModelsTest — no emulator needed, very fast)
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # 6. Upload unit test results so you can read them in the GitHub Actions tab
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if tests fail so you can diagnose failures
        with:
          name: unit-test-results
          path: app/build/reports/tests/

      # 7. Build a debug APK — proves the project compiles cleanly
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 8. Upload the APK as a build artifact so teammates can download and install it
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetBuddy-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  # ============================================================
  # JOB 2 — Run instrumented tests on an Android emulator
  #          (DatabaseHelperTest, SessionManagerTest)
  # ============================================================
  instrumented-tests:
    name: Instrumented Tests (Emulator)
    runs-on: ubuntu-latest
    # Only run on push to main/master — emulator tests are slow
    if: github.event_name == 'push'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Enable KVM acceleration so the emulator runs at usable speed on GitHub's Linux runners
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Run instrumented tests on a headless emulator using the official Google action
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34           # Android 14 — matches your targetSdkVersion
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedAndroidTest --no-daemon

      # Upload the instrumented test report
      - name: Upload instrumented test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
